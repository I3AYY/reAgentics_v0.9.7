const { createApp, ref, reactive, onMounted, computed, watch, nextTick } = Vue;

const runGas = (funcName, ...args) => {
    return new Promise((resolve, reject) => {
        if (typeof google === 'undefined') { 
            reject(new Error("Network Error: ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาตรวจสอบอินเทอร์เน็ต")); 
            return; 
        }
        google.script.run
            .withSuccessHandler(res => res ? resolve(res) : reject(new Error("No response from server")))
            .withFailureHandler(err => reject(new Error(err.message || "เกิดข้อผิดพลาดจากเซิร์ฟเวอร์")))
            [funcName](...args);
    });
};

        const dashboardReportData = computed(() => {

            if (targetGroup !== 'All') {
                list = list.filter(item => item.group === targetGroup);
            }
            if (filterDashboardUnit.value !== 'All') {
                list = list.filter(item => item.unitID === filterDashboardUnit.value);
            }
            return list;
        });

        const stats = computed(() => {
            let list = dashboardReportData.value;
            let total = list.length;
            let low = 0;
            let expiring = 0;
            let expired = 0;
            let rxTotal = 0;
            let dispTotal = 0;

            list.forEach(item => {
                if (item.balance < item.minLevel && item.status !== 'Suspended') low++;
                if (item.expStatus === 'Expiring') expiring++;
                if (item.expStatus === 'Expired') expired++;
                rxTotal += (Number(item.receiveSum) || 0);
                dispTotal += (Number(item.dispenseSum) || 0);
            });

            const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
            let rRatio = rxTotal;
            let dRatio = dispTotal;
            
            if (rxTotal > 0 && dispTotal > 0) {
                const divisor = gcd(rxTotal, dispTotal);
                rRatio = rxTotal / divisor;
                dRatio = dispTotal / divisor;
            } else if (rxTotal > 0 && dispTotal === 0) {
                dRatio = 0; 
                rRatio = 1;
            } else if (dispTotal > 0 && rxTotal === 0) {
                rRatio = 0; 
                dRatio = 1;
            }

            return { total, lowStock: low, expiring, expired, receiveRatio: rRatio, dispenseRatio: dRatio }; 
        });

        const filteredInventory = computed(() => {
            let list = inventoryList.value;
            const targetGroup = (user.role || '').toUpperCase() === 'ADMIN' ? filterGroup.value : user.group;

            if (filterUnit.value !== 'All') list = list.filter(item => item.unitID === filterUnit.value);
            if (filterReagType.value !== 'All') list = list.filter(item => item.reagType === filterReagType.value);

            if (filterSearch.value) {
                const q = filterSearch.value.toLowerCase();
                list = list.filter(item => item.itemName.toLowerCase().includes(q) || item.itemID.toLowerCase().includes(q));
            }
            return list;
        });

        const filteredItemOptions = computed(() => {
            if (!transactionFilterUnit.value) return []; 
            let list = inventoryList.value.filter(item => item.status !== 'Suspended');
            list = list.filter(item => item.unitID === transactionFilterUnit.value);
            
            if (transactionFilterReagType.value !== 'All') {
                list = list.filter(item => item.reagType === transactionFilterReagType.value);
            }

            return list.map(item => ({
                valStr: item.itemID + '|' + item.itemName + '|' + item.unit,
                displayText: item.itemID + ' : ' + item.itemName
            }));
        });

        const searchedReceiveOptions = computed(() => {
            let list = filteredItemOptions.value;
            if (searchQueryReceive.value) {
                const q = searchQueryReceive.value.toLowerCase();
                list = list.filter(o => o.displayText.toLowerCase().includes(q));
            }
            return list;
        });

        const searchedDispenseOptions = computed(() => {
            let list = filteredItemOptions.value;
            if (searchQueryDispense.value) {
                const q = searchQueryDispense.value.toLowerCase();
                list = list.filter(o => o.displayText.toLowerCase().includes(q));
            }
            return list;
        });

        const searchedEditTransOptions = computed(() => {
            let list = inventoryList.value.filter(item => item.status !== 'Suspended' && item.unitID === formTransactionEdit.unitID);

        });

        const filteredLogsList = computed(() => {
            let list = logsList.value;
            const targetGroup = (user.role || '').toUpperCase() === 'ADMIN' ? filterLogGroup.value : user.group;
            
            if (targetGroup !== 'All') list = list.filter(l => l.group === targetGroup);
            if (filterLogUnit.value !== 'All') list = list.filter(l => l.unitID === filterLogUnit.value);

                const q = filterLogSearch.value.toLowerCase();

                    (l.itemName && l.itemName.toLowerCase().includes(q)) || 
                    (l.itemID && l.itemID.toLowerCase().includes(q)) || 
                    (l.lot && l.lot.toLowerCase().includes(q))

            }

            return selectedLotObj ? selectedLotObj.qty : Number.MAX_SAFE_INTEGER;

            if (!formReceive.itemStr) return '';

            return item && item.image ? item.image : '';
        });

            if (!formDispense.itemStr) return '';
            const itemID = formDispense.itemStr.split('|')[0];
            const item = inventoryList.value.find(i => i.itemID === itemID);
            return item && item.image ? item.image : '';
        });

        const AFK_LIMIT_MS = 25 * 60 * 1000; 
        const SESSION_LIMIT_MS = 60 * 60 * 1000; 

        // Watchers
        watch(page, (newVal, oldVal) => {
            // --- Cyber Security: Route Guard (Defense in Depth) ---
            if (newVal === 'transactions' && (user.role || '').toUpperCase() === 'VISITER') {
                if(typeof Swal !== 'undefined') Swal.fire('ปฏิเสธการเข้าถึง', 'สิทธิ์ VISITER ไม่สามารถทำรายการรับ/เบิกได้', 'warning');

                return;

                return;

                if (inventoryList.value.length > 0) {
                    fetchData(true, true);

                    fetchData(false, false);
                }

            if (newVal === 'logs') {
                if (logsList.value.length > 0) {

                } else {
                    fetchLogs(false, false);
                }

        });

        watch(filterGroup, () => {

            filterReagType.value = 'All';

        watch(() => formItem.useAnalyzer, (newVal) => {

        watch(dashboardFilterMonth, () => {

            formReceive.itemStr = ''; 
            searchQueryReceive.value = '';
            formDispense.itemStr = ''; 
            searchQueryDispense.value = '';
            transactionFilterReagType.value = 'All';
        });

        watch(() => formDispense.itemStr, async (newVal) => {
            availableDispenseLots.value = [];
            formDispense.lot = '';

                const itemID = newVal.split('|')[0];
                isDispenseLotsLoading.value = true;

                    const res = await runGas('apiGetActiveLots', itemID);
                    if (res.success && res.lots.length > 0) {
                        let lots = res.lots;
                        lots.forEach(l => l.expDateObj = new Date(l.exp).getTime());
                        lots.sort((a, b) => a.expDateObj - b.expDateObj);
                        lots[0].isFEFO = true; 
                        availableDispenseLots.value = lots;
                    }
                } catch(e) { 
                    console.error(e); 
                } finally { 
                    isDispenseLotsLoading.value = false; 
                }
            }
        });

        watch(() => config.selectedYear, (newVal) => { 
            if (newVal && page.value !== 'login') { 
                fetchData(false, true); 
                fetchLogs(false, true); 
                saveSession(); 
            } 
        });

        watch(() => showStickerModal.value, (newVal) => { 
            if(newVal) {
                setTimeout(generatePreviewBarcode, 300); 
            } else {
                activeStickerElement.value = null;
                if (dragMouseMoveHandler && dragMouseUpHandler) {
                    document.removeEventListener('mousemove', dragMouseMoveHandler);
                    document.removeEventListener('mouseup', dragMouseUpHandler);
                    dragMouseMoveHandler = null;
                    dragMouseUpHandler = null;
                }
            }
        });

        watch(() => [stickerConfig.barcodeHeight, stickerConfig.barcodeWidth], () => { 
            if (showStickerModal.value) generatePreviewBarcode(); 
        }, { deep: true });


        // Methods
        const selectReceiveItem = (opt) => {
            formReceive.itemStr = opt.valStr; 
            searchQueryReceive.value = opt.displayText; 
            showDropdownReceive.value = false;
        };

        const selectDispenseItem = (opt) => {

            searchQueryDispense.value = opt.displayText;

            formTransactionEdit.itemName = opt.itemName;
            searchQueryEditTrans.value = opt.displayText;
            showDropdownEditTrans.value = false;
        };

        const handleDispenseBlur = () => { setTimeout(() => { showDropdownDispense.value = false; }, 200); };
        const handleEditTransBlur = () => { setTimeout(() => { showDropdownEditTrans.value = false; }, 200); };

        const startOtpTimer = () => {
            otpCooldown.value = 60;
            if (otpTimerInterval) clearInterval(otpTimerInterval);
            otpTimerInterval = setInterval(() => {
                otpCooldown.value--;
                if (otpCooldown.value <= 0) clearInterval(otpTimerInterval);
            }, 1000);
        };

        const handleLoginStep1 = async () => {
            if (!formLogin.username || !formLogin.password) return;
            isLoading.value = true;
            try {
                const res = await runGas('verifyLogin', formLogin.username, formLogin.password);
                if (res.success) { 
                    if (res.bypassed) {
                        Object.assign(user, res.user); 
                        config.years = res.years || [];
                        if (config.years.length > 0 && !config.selectedYear) {
                            config.selectedYear = config.years[config.years.length - 1];
                        }
                        page.value = 'dashboard'; 
                        saveSession(); 
                        fetchData(false, false); 
                        fetchStickerConfig(); 
                        fetchFormOptions();
                        resetAfkTimer(); 
                        startSessionMonitor(); 
                        if(typeof Swal !== 'undefined') {
                            Swal.fire({ icon: 'success', title: 'Welcome', text: 'คุณ ' + user.name, timer: 1500, showConfirmButton: false });
                        }
                    } else {
                        loginStep.value = 2; 
                        otpMessage.value = res.message; 
                        user.userId = res.userId; 
                        startOtpTimer();
                    }
                } else { 
                    if(typeof Swal !== 'undefined') Swal.fire('Login Failed', res.message, 'error'); 
                }
            } catch (err) { 
                Swal.fire('ข้อผิดพลาด', err.message, 'error'); 
            } finally { 
                isLoading.value = false; 
            }
        };

        const handleResendOtp = async () => {
            if (otpCooldown.value > 0) return;
            isLoading.value = true;
            try {
                const res = await runGas('apiRequestNewOTP', user.userId);
                if (res.success) {
                    otpInput.value = ''; 
                    otpMessage.value = res.message; 
                    startOtpTimer();
                    if(typeof Swal !== 'undefined') {
                        Swal.fire({ icon: 'success', title: 'ส่ง OTP ใหม่แล้ว', text: 'กรุณาตรวจสอบที่อีเมลของคุณ', timer: 1500, showConfirmButton: false });
                    }
                } else { 
                    if(typeof Swal !== 'undefined') Swal.fire('ข้อผิดพลาด', res.message, 'error'); 
                }
            } catch (err) { 
                Swal.fire('ข้อผิดพลาด', err.message, 'error'); 
            } finally { 
                isLoading.value = false; 
            }
        };

        const handleLoginStep2 = async () => {
            if (!otpInput.value) return;
            isLoading.value = true;
            try {
                const res = await runGas('verifyOTP', user.userId, otpInput.value);
                if (res.success) {
                    if (otpTimerInterval) clearInterval(otpTimerInterval);
                    Object.assign(user, res.user); 
                    config.years = res.years || [];
                    
                    if (config.years.length > 0 && !config.selectedYear) {
                        config.selectedYear = config.years[config.years.length - 1];
                    }
                    page.value = 'dashboard'; 
                    saveSession(); 
                    fetchData(false, false); 
                    fetchStickerConfig(); 
                    fetchFormOptions();
                    resetAfkTimer(); 
                    startSessionMonitor(); 
                    
                    if(typeof Swal !== 'undefined') {
                        Swal.fire({ icon: 'success', title: 'Welcome', text: 'คุณ ' + user.name, timer: 1500, showConfirmButton: false });
                    }
                } else {

        const startDrag = (elementKey, event) => {
            activeStickerElement.value = elementKey;
            const startX = event.clientX; 
            const startY = event.clientY;
            const initialX = stickerConfig.layout[elementKey].x; 
            const initialY = stickerConfig.layout[elementKey].y;
            
            dragMouseMoveHandler = (e) => {
                const dxMm = pxToMm(e.clientX - startX) / stickerZoom.value; 
                const dyMm = pxToMm(e.clientY - startY) / stickerZoom.value;
                stickerConfig.layout[elementKey].x = Math.round((initialX + dxMm) * 10) / 10; 
                stickerConfig.layout[elementKey].y = Math.round((initialY + dyMm) * 10) / 10;
            };
            
            dragMouseUpHandler = () => { 
                document.removeEventListener('mousemove', dragMouseMoveHandler); 
                document.removeEventListener('mouseup', dragMouseUpHandler); 
                dragMouseMoveHandler = null;
                dragMouseUpHandler = null;
            };
            document.addEventListener('mousemove', dragMouseMoveHandler); 
            document.addEventListener('mouseup', dragMouseUpHandler);
        };

        const startRotate = (elementKey, event) => {
            event.stopPropagation(); 
            activeStickerElement.value = elementKey;
            
            const targetEl = event.target.closest('.sticker-element'); 
            if (!targetEl) return;
            
            const rect = targetEl.getBoundingClientRect(); 
            const centerX = rect.left + rect.width / 2; 
            const centerY = rect.top + rect.height / 2;
            
            dragMouseMoveHandler = (e) => {
                const radians = Math.atan2(e.clientY - centerY, e.clientX - centerX);
                let degrees = (radians * (180 / Math.PI)) + 90; 
                if (degrees < 0) degrees += 360;
                
                const snap = 15; 
                degrees = Math.round(degrees / snap) * snap; 
                if (degrees === 360) degrees = 0;
                
                stickerConfig.layout[elementKey].rot = degrees;
            };
            
            dragMouseUpHandler = () => { 
                document.removeEventListener('mousemove', dragMouseMoveHandler); 
                document.removeEventListener('mouseup', dragMouseUpHandler); 
                dragMouseMoveHandler = null;
                dragMouseUpHandler = null;
            };
            document.addEventListener('mousemove', dragMouseMoveHandler);

                    if (l.cyto.visible) {

                        htmlContent += `<div class="el" style="${style}">${item.itemName.substring(0, 20)}</div>`;

                        htmlContent += `<div class="el" style="${style}">Lot: ${item.lot}</div>`;
                    }
                    if (l.spec.visible) {
                        const fw = l.spec.bold ? 'bold' : 'normal';
                        const ff = getFontStr(l.spec.font);
                        const style = `left:${l.spec.x}mm; top:${l.spec.y}mm; font-size:${l.spec.size}pt; font-weight:${fw}; font-family:${ff}; transform: translate(-50%, -50%) rotate(${l.spec.rot}deg);`;
                        htmlContent += `<div class="el" style="${style}">Exp: ${formatDateThai(item.exp)}</div>`;
                    }
                    if (l.unit.visible) {

                        const style = `left:${l.unit.x}mm; top:${l.unit.y}mm; font-size:${l.unit.size}pt; font-weight:${fw}; font-family:${ff}; transform: translate(-50%, -50%) rotate(${l.unit.rot}deg);`;
                        htmlContent += `<div class="el" style="${style}">${item.unit}</div>`;
                    }
                    if (l.bar.visible && barcodeSvgStr) {
                        const style = `left:${l.bar.x}mm; top:${l.bar.y}mm; transform: translate(-50%, -50%) rotate(${l.bar.rot}deg);`;
                        htmlContent += `<div class="el" style="${style}">${barcodeSvgStr}</div>`;
                    }
                    if (l.barText && l.barText.visible) {
                        const fw = l.barText.bold ? 'bold' : 'normal';
                        const ff = getFontStr(l.barText.font);
                        const style = `left:${l.barText.x}mm; top:${l.barText.y}mm; font-size:${l.barText.size}pt; font-weight:${fw}; font-family:${ff}; transform: translate(-50%, -50%) rotate(${l.barText.rot}deg);`;

                    htmlContent += '</div>';

            htmlContent += '</body></html>';

            printIframe.style.cssText = 'position:fixed; right:0; bottom:0; width:0; height:0; border:0;'; 
            document.body.appendChild(printIframe); 
            
            const iframeDoc = printIframe.contentWindow.document; 
            iframeDoc.open(); 
            iframeDoc.write(htmlContent); 
            iframeDoc.close();
            
            let isPrinted = false; 
            printIframe.onload = () => { 
                setTimeout(() => { 
                    try { 
                        if (isPrinted) return; 
                        isPrinted = true; 
                        printIframe.contentWindow.focus(); 
                        printIframe.contentWindow.print(); 
                        setTimeout(() => { document.body.removeChild(printIframe); }, 2000); 
                    } catch(e) { 
                        console.error("Print Error: ", e); 
                    } 
                }, 800); 
            };
            
            // Fallback for browsers where onload doesn't trigger properly
            setTimeout(() => { 
                if (document.body.contains(printIframe)) { 
                    try { 
                        if (isPrinted) return; 
                        isPrinted = true; 
                        printIframe.contentWindow.focus(); 
                        printIframe.contentWindow.print();
